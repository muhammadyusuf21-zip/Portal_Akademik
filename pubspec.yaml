name: academic
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.9
  supabase_flutter: ^2.16.0
  file_picker: ^11.0.2
